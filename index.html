<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proyecto Mapbox - Ubicación en Tiempo Real</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.css" rel="stylesheet">

    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100%; height: 100vh; }

        .titulo {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(58, 65, 130, 0.9);
            color: white;
            padding: 10px 15px;
            font-family: Arial, sans-serif;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 1;
        }

        #infoPanel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(58, 65, 130, 0.9);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            z-index: 1;
            font-family: Arial;
            color: white;
            min-width: 180px;
        }

        span { font-weight: bold; }
    </style>
</head>
<body>

<div class="titulo">
    <h3>Proyecto Mapbox</h3>
    <p>De: Andres Mamani Kantuta</p>
</div>

<div id="infoPanel">
    <p><strong>Latitud:</strong> <span id="latWeb">Esperando...</span></p>
    <p><strong>Longitud:</strong> <span id="lonWeb">Esperando...</span></p>
    <p><strong>Estado:</strong> <span id="estadoWeb">SIN DATOS</span></p>
</div>

<div id="map"></div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    // --- CONFIGURACIÓN DE MAPBOX ---
    mapboxgl.accessToken = 'pk.eyJ1IjoibWthMjAzMTk3MyIsImEiOiJjbW04ZWNubTAwY3RrMnBvOXh6bmVid2Z6In0.q7TJCtjkdpz9b9WuvFpzhA';

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/streets-v12',
        center: [-68.1193, -16.4897], 
        zoom: 12
    });

    map.addControl(new mapboxgl.NavigationControl());

    let marcador = null;

    // --- CONFIGURACIÓN DE FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyCOilaXprOwM7oTRUqXaH8rDpDQbL_Sypc",
        authDomain: "mapboxmka.firebaseapp.com",
        databaseURL: "https://mapboxmka-default-rtdb.firebaseio.com",
        projectId: "mapboxmka",
        storageBucket: "mapboxmka.firebasestorage.app",
        messagingSenderId: "285962816858",
        appId: "1:285962816858:web:a9500ffeb2b5e19f2b3763"
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const ubicacionRef = database.ref('ubicacion_actual');

    // --- ESCUCHAR CAMBIOS EN TIEMPO REAL ---
    ubicacionRef.on('value', (snapshot) => {
        const data = snapshot.val();
        console.log("Datos recibidos de Firebase:", data);
        
        // CORRECCIÓN AQUÍ: Usamos data.lat y data.lng tal como están en tu base de datos
        if (data && data.lat !== undefined && data.lng !== undefined) {
            const lat = parseFloat(data.lat);
            const lng = parseFloat(data.lng);

            // Actualizar textos en el panel
            document.getElementById("latWeb").textContent = lat.toFixed(6);
            document.getElementById("lonWeb").textContent = lng.toFixed(6);

            // Manejo de estado: si no existe "activo", por defecto es true
            const estadoEl = document.getElementById("estadoWeb");
            if (data.activo === false) {
                estadoEl.textContent = "🔴 INACTIVO";
                estadoEl.style.color = "red";
            } else {
                estadoEl.textContent = "🟢 ACTIVO";
                estadoEl.style.color = "lime";
            }

            // Mover el mapa suavemente
            map.flyTo({
                center: [lng, lat],
                zoom: 17,
                essential: true
            });

            // Actualizar o crear marcador
            if (marcador) {
                marcador.setLngLat([lng, lat]);
            } else {
                marcador = new mapboxgl.Marker({ color: 'red' })
                    .setLngLat([lng, lat])
                    .addTo(map);
            }
        } else {
            document.getElementById("estadoWeb").textContent = "Esperando lat/lng...";
        }
    }, (error) => {
        console.error("Error de Firebase:", error);
        document.getElementById("estadoWeb").textContent = "Error de permisos";
    });
</script>

</body>
</html>
