<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proyecto Mapbox - Localización GPS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.css" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100%; height: 100vh; }
        .titulo {
            position: absolute; top: 10px; left: 10px;
            background: rgba(58, 65, 130, 0.95); color: white;
            padding: 10px 15px; border-radius: 8px; z-index: 10; font-family: sans-serif;
        }
        #infoPanel {
            position: absolute; bottom: 20px; left: 20px;
            background: rgba(58, 65, 130, 0.95); padding: 15px;
            border-radius: 10px; color: white; z-index: 10; font-family: sans-serif;
            min-width: 200px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .valor { color: #00fbff; font-weight: bold; }
    </style>
</head>
<body>

<div class="titulo">
    <h3>Proyecto Mapbox</h3>
    <p>Andres Mamani Kantuta</p>
</div>

<div id="infoPanel">
    <p>Lat: <span id="latWeb" class="valor">Esperando...</span></p>
    <p>Lng: <span id="lonWeb" class="valor">Esperando...</span></p>
    <p>Estado: <span id="estadoWeb" style="font-weight:bold;">CONECTANDO...</span></p>
</div>

<div id="map"></div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    // 1. Mapbox Setup
    mapboxgl.accessToken = 'pk.eyJ1IjoibWthMjAzMTk3MyIsImEiOiJjbW04ZWNubTAwY3RrMnBvOXh6bmVid2Z6In0.q7TJCtjkdpz9b9WuvFpzhA';
    
    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/streets-v12',
        center: [-68.1193, -16.4897],
        zoom: 12
    });

    let marcador = null;

    // 2. Firebase Setup
    const firebaseConfig = {
        apiKey: "AIzaSyCOilaXprOwM7oTRUqXaH8rDpDQbL_Sypc",
        authDomain: "mapboxmka.firebaseapp.com",
        databaseURL: "https://mapboxmka-default-rtdb.firebaseio.com",
        projectId: "mapboxmka",
        storageBucket: "mapboxmka.firebasestorage.app",
        messagingSenderId: "285962816858",
        appId: "1:285962816858:web:a9500ffeb2b5e19f2b3763"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const ubicacionRef = database.ref('ubicacion_actual');

    // 3. Escucha de datos
    ubicacionRef.on('value', (snapshot) => {
        const data = snapshot.val();
        console.log("Procesando datos:", data);

        if (data && data.latitud && data.longitud) {
            // Convertir a número por seguridad
            const lat = parseFloat(data.latitud);
            const lng = parseFloat(data.longitud);

            // ACTUALIZAR TEXTOS (Asegúrate que los IDs coincidan)
            document.getElementById("latWeb").textContent = lat.toFixed(6);
            document.getElementById("lonWeb").textContent = lng.toFixed(6);
            
            const estadoEl = document.getElementById("estadoWeb");
            estadoEl.textContent = "🟢 ACTIVO";
            estadoEl.style.color = "lime";

            // ACTUALIZAR MARCADOR Y MAPA
            // Nota: Mapbox usa [Longitud, Latitud]
            if (marcador) {
                marcador.setLngLat([lng, lat]);
            } else {
                marcador = new mapboxgl.Marker({ color: 'red' })
                    .setLngLat([lng, lat])
                    .addTo(map);
            }

            map.flyTo({
                center: [lng, lat],
                zoom: 17,
                essential: true
            });

        } else {
            console.warn("Estructura de datos no válida:", data);
            document.getElementById("estadoWeb").textContent = "DATOS INCOMPLETOS";
        }
    }, (error) => {
        console.error("Error de Firebase:", error);
        document.getElementById("estadoWeb").textContent = "ERROR DE CONEXIÓN";
    });
</script>
</body>
</html>
