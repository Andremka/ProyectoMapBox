<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proyecto Mapbox - Localización GPS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.css" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100%; height: 100vh; }
        .titulo {
            position: absolute; top: 10px; left: 10px;
            background: rgba(58, 65, 130, 0.9); color: white;
            padding: 10px; border-radius: 8px; z-index: 10; font-family: sans-serif;
        }
        #infoPanel {
            position: absolute; bottom: 20px; left: 20px;
            background: rgba(58, 65, 130, 0.9); padding: 15px;
            border-radius: 10px; color: white; z-index: 10; font-family: sans-serif;
        }
    </style>
</head>
<body>

<div class="titulo">
    <h3>Proyecto Mapbox</h3>
    <p>Andres Mamani Kantuta</p>
</div>

<div id="infoPanel">
    <p>Lat: <span id="latWeb">...</span></p>
    <p>Lng: <span id="lonWeb">...</span></p>
    <p>Estado: <span id="estadoWeb">CONECTANDO...</span></p>
</div>

<div id="map"></div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    mapboxgl.accessToken = 'pk.eyJ1IjoibWthMjAzMTk3MyIsImEiOiJjbW04ZWNubTAwY3RrMnBvOXh6bmVid2Z6In0.q7TJCtjkdpz9b9WuvFpzhA';
    
    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/streets-v12',
        center: [-68.1193, -16.4897],
        zoom: 12
    });

    let marcador = null;

    const firebaseConfig = {
        apiKey: "AIzaSyCOilaXprOwM7oTRUqXaH8rDpDQbL_Sypc",
        authDomain: "mapboxmka.firebaseapp.com",
        databaseURL: "https://mapboxmka-default-rtdb.firebaseio.com",
        projectId: "mapboxmka",
        storageBucket: "mapboxmka.firebasestorage.app",
        messagingSenderId: "285962816858",
        appId: "1:285962816858:web:a9500ffeb2b5e19f2b3763"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    // ESCUCHA LA RAÍZ POR SI ACASO LA CARPETA ESTÁ MAL ESCRITA
    database.ref('ubicacion_actual').on('value', (snapshot) => {
        const data = snapshot.val();
        console.log("DATOS RECIBIDOS:", data);

        if (!data) {
            document.getElementById("estadoWeb").textContent = "BASE DE DATOS VACÍA";
            return;
        }

        // --- BUSCADOR AUTOMÁTICO DE COORDENADAS ---
        // Esto busca latitud/lat y longitud/lng sin importar mayúsculas o minúsculas
        let lat = null;
        let lng = null;

        for (let key in data) {
            let k = key.toLowerCase();
            if (k.includes('lat')) lat = parseFloat(data[key]);
            if (k.includes('ln') || k.includes('lo')) lng = parseFloat(data[key]);
        }

        if (lat !== null && lng !== null && !isNaN(lat) && !isNaN(lng)) {
            // ACTUALIZAR PANEL
            document.getElementById("latWeb").innerText = lat.toFixed(6);
            document.getElementById("lonWeb").innerText = lng.toFixed(6);
            document.getElementById("estadoWeb").innerText = "🟢 ACTIVO";
            document.getElementById("estadoWeb").style.color = "lime";

            // ACTUALIZAR MAPA
            if (marcador) {
                marcador.setLngLat([lng, lat]);
            } else {
                marcador = new mapboxgl.Marker({ color: 'red' }).setLngLat([lng, lat]).addTo(map);
            }
            map.flyTo({ center: [lng, lat], zoom: 16 });

        } else {
            document.getElementById("estadoWeb").textContent = "ERROR: LLAVES NO RECONOCIDAS";
            console.error("No se encontraron campos lat/lng en:", data);
        }
    });
</script>
</body>
</html>
